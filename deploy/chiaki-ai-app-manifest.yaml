display_information:
  name: Chiaki AI
  description: Lipple タスク管理オブザーバー（観測・促し・提案）
  background_color: "#1a1d21"
features:
  bot_user:
    display_name: Chiaki AI
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write
      - im:write
      - app_mentions:read
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - files:read
      - reactions:read
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
